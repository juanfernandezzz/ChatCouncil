name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build web
        run: pnpm build:web

      - name: Build extension
        run: pnpm build:ext

      - name: Zip extension artifact
        run: pnpm zip:ext

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatcouncil-extension
          path: apps/extension/.output/*.zip
          if-no-files-found: warn
