name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Guard key-vault isolation (Q10)
        run: pnpm guard:keys

      - name: Guard judge anonymity (Q30)
        run: pnpm guard:judge

      - name: Guard sync storage purity (Fase 6, E7)
        run: pnpm guard:sync

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Harness offline Fase 5 (informe/juez — Fase 9, E5)
        run: pnpm harness:fase5

      - name: Harness offline Fase 6 (sync/mail — Fase 9, E5)
        run: pnpm harness:fase6

      - name: Build web
        run: pnpm build:web

      - name: Install Playwright Chromium
        run: pnpm --filter @chatcouncil/web exec playwright install --with-deps chromium

      - name: E2E flujo crítico (Playwright, red mockeada — Fase 9, E1/E6)
        run: pnpm test:e2e

      - name: Build extension
        run: pnpm build:ext

      - name: Zip extension artifact
        run: pnpm zip:ext

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatcouncil-extension
          path: apps/extension/.output/*.zip
          if-no-files-found: warn
